version: "3.8"

services:
  db:
    image: mariadb:10.11
    container_name: io200-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-io200}
      MYSQL_USER: ${MYSQL_USER:-io200}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_db_password}
    volumes:
      - /volume1/docker/io200/mysql:/var/lib/mysql
    networks:
      - io200-net

  app:
    image: ghcr.io/lancetm714/io200:latest
    container_name: io200-app
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment:
      CMS_DB_HOST: db
      CMS_DB_USER: ${MYSQL_USER:-io200}
      CMS_DB_PASSWORD: ${MYSQL_PASSWORD:-changeme_db_password}
      CMS_DB_NAME: io200
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-admin@example.com}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:-changeme_admin_password}
      CMS_WEBSITE_URL: ${CMS_WEBSITE_URL:-http://localhost:8080}
      CMS_WEBSITE_TITLE: ${CMS_WEBSITE_TITLE:-My IO200 Website}
      PHP_INI_UPLOAD_MAX_FILESIZE: 128M
      PHP_INI_POST_MAX_SIZE: 128M
      PHP_INI_MAX_EXECUTION_TIME: 120
      PHP_INI_MEMORY_LIMIT: 256M
    volumes:
      - /volume1/docker/io200/storage:/var/www/html/storage
    depends_on:
      - db
    networks:
      - io200-net

networks:
  io200-net:
    driver: bridge
